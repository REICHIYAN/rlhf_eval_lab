hf:
  model_name: sshleifer/tiny-gpt2
  temperature: 1.0

dataset:
  name: hh_rlhf
  split: train
  source: local
  path: test_data/offline_prompts_small.jsonl
  prompt_key: prompt
  subsample_n: 32
  seed: 0

eval:
  max_new_tokens: 32

ppo:
  kl_beta: 0.1

train:
  hf_ppo_method_keys:
    - ppo_standard
    - kl_ppo_fixed
    - governor

  hf_sft_steps: 0
  hf_ppo_steps: 12

  ppo_clip: 0.2
  ppo_lr: 5e-5

  governor:
    off_max: 1.01
    risk_crit: 999.0
    kl_max: 5.0

    # KL主導で閉じる（offsupportは補助に落とす）
    w_kl: 2.5
    kl_target: 0.0010
    w_off: 0.05
    w_var: 0.00

    # GKを少し鋭くして gate を落とす
    gk_j1: 0.05
    gk_j2: 0.05

    # 最小更新量（閉じてもゼロにはしない）
    lr_scale_min: 0.08
    reward_scale_min: 0.08

    # βが下限に張り付かないようにする（ここが重要）
    beta_init: 0.2
    beta_min: 0.12
    beta_max: 2.0
    kp: 0.20
    ki: 0.02
    beta_gate_gain: 0.30

    impulse: stop
